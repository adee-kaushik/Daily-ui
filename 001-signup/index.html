<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodii-Signup page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
       <div class="melodi"> <img class="logo" src="https://i.pinimg.com/1200x/7e/b4/58/7eb458e965674999db51cd96fb26e390.jpg" alt="Melodii-Logo">
        <h1>Melodii
            <p>Your Own Music Everywhere.</p>
        </h1>
        
        </div>
        <div class="signup">
            <h2>Create Your account</h2>
            <h3>Free for 25 Days.</h3>
            <Form>
                <div class="btnn">
            <button  google"><img src="https://media.istockphoto.com/id/2228661068/photo/isolated-google-logo-symbolizing-internet-search-and-technology.webp?a=1&b=1&s=612x612&w=0&k=20&c=711C2QCJ2SLkaDr9rZJm3l1TJlqErNAnS3fe0rgcRIg=" alt="Google logo">Continue with Google</button>
            <button class="github"><img src="https://s.yimg.com/fz/api/res/1.2/aSSLLJ.i.U9lirtzpxNZEw--~C/YXBwaWQ9c3JjaGRkO2ZpPWZpbGw7aD00MTI7cHhvZmY9NTA7cHlvZmY9MTAwO3E9ODA7c3M9MTt3PTM4OA--/https://i.pinimg.com/736x/64/88/0b/64880b9b0fe5b53bbe3f7280d262b33f.jpg" alt="Github logo">Continue with Github</button>
            </div>
            <p><strong>Continue with email:</strong></p>
            <label for="name">Full Name</label>
            <input type="text" placeholder="e.g: Aditya Mishra">
            <label for="email">Eamil address</label>
            <input type="email" placeholder="e.g: aditya@gmail.com">
            <label for="password">Password:</label>
            <input type="password" placeholder="Min. 7 Characters" >
            <label for="declaration" ><input type="checkbox" class="declaration">I agree to melodii's <span>Terms</span> & <span>Conditions.</span></label>
            <p>already Signed up! <a href="">Login in</a></p>
            <input type="submit" name="submit" id="submit">
            </Form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
